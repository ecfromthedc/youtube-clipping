<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover: without it env(safe-area-inset-*) is 0 on iPhone and
         the tab-bar safe-area padding is dead code (campaign hub lesson). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Tides Tiller</title>
    <!-- styles.css is the parity contract: copied verbatim from rust/web/styles.css,
         never edited during the port. Fonts + logo resolve to /static/* which the
         ycp server already serves from the embedded old bundle. -->
    <link data-trunk rel="css" href="styles.css" />
    <link data-trunk rel="copy-dir" href="fonts" />
    <link data-trunk rel="copy-file" href="logo.svg" />
    <!-- Vendored Page Agent (P4): pinned 1.11.0, bundled self-contained via
         esbuild from npm — NO CDN at runtime (an esm.sh hiccup used to blank
         the whole old app; never again). copilot.rs consumes window.PageAgent. -->
    <link data-trunk rel="copy-file" href="vendor/page-agent-1.11.0.bundle.mjs" />
    <script type="module">
      const base = location.pathname.startsWith("/next") ? "/next/" : "/";
      try {
        const m = await import(base + "page-agent-1.11.0.bundle.mjs");
        window.PageAgent = m.PageAgent;
      } catch (e) {
        console.error("Page Agent vendored bundle failed to load:", e);
      }
    </script>
    <link
      data-trunk
      rel="rust"
      data-wasm-opt="z"
      data-wasm-opt-params="--enable-bulk-memory-opt --enable-nontrapping-float-to-int"
    />
  </head>
  <body></body>
</html>
