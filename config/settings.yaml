# Tunable knobs for the closed loop. No secrets here (those live in .env).

sourcing:
  # How many top videos to surface per source creator each day.
  per_creator: 3
  # Only consider source videos published within this many days.
  lookback_days: 14
  # How many recent videos per creator to re-fetch with REAL metadata.
  # Flat enumerate is cheap but returns view_count=None; we pay the non-flat
  # cost only on this many most-recent candidates, then rank by velocity.
  meta_fetch: 8
  # How many creators to fetch concurrently (I/O-bound; thread pool).
  concurrency: 8
  # Minimum view count for a source video to be queue-worthy.
  min_views: 50000
  # How many days of "fresh velocity" still counts as hot.
  velocity_window_hours: 168  # 7 days

scoring:
  # Virality score weights (must sum to ~1.0). Tune from the weekly brief.
  weights:
    views_7d: 0.50        # log-normalized 7-day views
    retention: 0.30       # average view percentage / retention
    revenue_per_1k: 0.20  # $ per 1k (ad RPM, owned channels)
  # Length buckets (seconds) for rollup analysis.
  length_buckets: [0, 15, 25, 35, 45, 60]
  # A combo must have at least this many clips before we trust its average.
  min_sample: 4
  # "Scale" = top quantile, "Kill" = bottom quantile, by mean score.
  scale_quantile: 0.80
  kill_quantile: 0.20

brief:
  # Top-N combos to feature in each section.
  top_n: 5

transcribe:
  # whisper.cpp is the default engine (3–5x faster). Falls back to openai-whisper
  # automatically if no whisper.cpp binary is found. Run scripts/setup-whisper.sh once.
  binary:   # whisper-cli (auto-detected if blank); or set WHISPER_CPP_BIN
  model: models/ggml-base.en.bin   # GGML model; relative to repo root or absolute
  language: en
  openai_model: small              # only used by the openai-whisper fallback

hooks:
  # Viral hooks are the highest-leverage creative lever, so the hook agent uses a
  # strong model via DeepSeek (NOT a local model). Needs DEEPSEEK_API_KEY (key in
  # 1Password — inject via `op read`, never on disk); falls back to the transcript
  # heuristic if absent. Override the model here if desired.
  model: deepseek-chat

qc:
  # auto: true  -> no human; the in-code guardrails decide (fully autonomous).
  # auto: false -> a human approves via the channel below. Flip to true once output earns trust.
  # AUTONOMOUS (2026-06-24, Eric's call): no clip-by-clip approval — guardrails are the gate,
  # the analytics loop is the quality control (kill what underperforms). Weekly review instead.
  auto: true
  # The review channel is NOT hardcoded. `auto` picks by configured creds
  # (slack > telegram > local). Or force one: slack | telegram | local.
  channel: auto

distribution:
  # PREFERRED: Postiz (public API) — we hold POSTIZ_API_TOKEN and connect the YouTube
  # channels directly in Postiz. ALTERNATIVE: Repurpose.io (outbox watch-folder).
  # Full plan + adapter contract: DISTRIBUTION.md.
  # LIVE (2026-06-24): POSTIZ_API_TOKEN set, Phoenix Protocol id verified + mapped below.
  # Manual Slack QC (qc.auto: false) is still the publish gate — nothing posts without a ✅.
  enabled: true
  provider: postiz         # postiz (preferred) | repurpose (alternative)

  postiz:
    api_url: https://api.postiz.com/public/v1   # self-hosted: <instance>/public/v1
    token_env: POSTIZ_API_TOKEN                  # key lives in .env / 1Password, never here
    schedule: schedule                           # now | schedule (schedule → space posts across the slots below)
    # Posting cadence for the owned channels. Approved clips are assigned to the next
    # free slots in order (today's remaining, then roll to following days). Channel-local
    # time. 3/day at US health-audience peaks: morning routine, lunch scroll, evening wind-down.
    posting_times: ["06:00", "12:30", "19:00"]
    timezone: America/New_York
    # Map each owned channel (CHANNEL-PLAYBOOK.md) -> its Postiz integration id.
    # Get ids from GET /public/v1/integrations; fill in once channels are connected.
    channels:
      hot-seat: ""         # Channel 1
      money-fights: ""     # Channel 2
      crash-out: ""        # Channel 3
      phoenix-protocol: "cmqsakb8z0123ml0yd61m7h9g"  # Channel 4 (Phoenix Protocol — health/longevity). VERIFIED 2026-06-24 via GET /integrations.
      boardroom: ""        # Channel 5

  # Alternative — Repurpose.io watch-folder (used only when provider: repurpose):
  outbox: data/outbox      # the folder Repurpose.io watches (sync to Drive/Dropbox)

  # Per-channel hashtags appended to each post's description (keyed by channel slug).
  # #shorts is the discovery essential; keep the rest tight + niche-relevant (3–5 wins).
  hashtags:
    default: ["#shorts"]
    phoenix-protocol: ["#shorts", "#health", "#longevity", "#fitness", "#wellness"]
    hot-seat: ["#shorts", "#debate", "#podcast", "#hottakes"]
    money-fights: ["#shorts", "#money", "#finance", "#investing"]
    crash-out: ["#shorts", "#podcast", "#comedy", "#funny"]
    boardroom: ["#shorts", "#business", "#entrepreneur", "#mindset"]

platforms: [youtube, tiktok, instagram]
lanes: [owned]   # owned = YPP asset (Whop cut 2026-06; pure owned-first)

# --- Vision moment selector (Gemini) -----------------------------------------
# Gemini watches the source video and picks the most clippable windows, replacing the
# blind transcript heuristic. Needs GEMINI_API_KEY in .env. Falls back to the heuristic
# whenever the key is missing or this is off — the pipeline never hard-breaks.
vision:
  enabled: true
  model: gemini-3.5-flash

# --- Reframe (vertical crop) -------------------------------------------------
# face = OpenCV face-pan crop that follows the speaker (best for talking heads);
# center = static center crop. Falls back to center whenever no face is found.
reframe:
  mode: face

# --- Captions / hook styling -------------------------------------------------
# case:     subtitle case — lower | upper (the hook title stays uppercase).
# size_pct: caption height as a % of FRAME WIDTH (not document points). 10 ≈ 108px
#           on a 1080-wide frame (the Opus look). 10px would be invisible.
# hook_hold_sec: how long the burned hook title stays on screen, minimum.
captions:
  case: lower
  size_pct: 10
  hook_hold_sec: 7

# --- Optimize (the double-down actuator) -------------------------------------
# Each cycle, winners (top-quantile virality) get sourced harder, losers throttled.
# boost/suppress multiply a creator's source-ranking velocity; floor keeps a starved
# creator from vanishing entirely (so it can recover if it starts winning again).
optimize:
  boost: 1.5
  suppress: 0.4
  floor: 0.1
