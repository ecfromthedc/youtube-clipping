# config/niches.yaml — Stage 1 sourcing spec. Promoted by the discovery loop
# (RESEARCH-GOAL-AND-LOOP.md), Cycle 1 (2026-06-22). Ranked source list +
# evidence live in SOURCE-INTELLIGENCE.md; the angles in CHANNEL-CONCEPTS.md.
#
# Each group below = ONE owned channel. The canonical channel map (sources -> format ->
# go/no-go gate -> optimize-on metric) is CHANNEL-PLAYBOOK.md. Groups are keyed by `name:`,
# and channel numbers here match the playbook (not file order).
#
# handle = a YouTube @handle. lane: owned = your YPP transformation channel
# (the only lane — Whop cut 2026-06; pure owned-first).
#
# has_captions: true  — RULE #1 (never two sets of subtitles). Set on any creator who
# burns their OWN captions into their videos; we then skip our word-by-word track for
# them (the hook still renders) and defer to theirs. Default (absent) = we add ours.
#
# Velocity numbers in `notes` are real (live yt-dlp peak views/hour, 2026-06-22).

niches:
  # ── Channel 1 · Hot Seat — debate/agitation flashpoints (highest engagement velocity) ──
  - name: debate-agitation
    lane_default: owned
    creators:
      - name: "Jubilee"
        handle: "@jubilee"
        lane: owned
        notes: "ROS 81.8. 51,725 views/hr peak — top live velocity. Surrounded 1v25 format; structured-debate policy carve-out. Clip the single 20-40s clash."
      - name: "No Jumper"
        handle: "@nojumper"
        lane: owned
        notes: "ROS 66.4. Culture/clash interviews; downsizing = open lane. Edgier — screen for protected-class lines."
      - name: "Pop Culture Crisis"
        handle: "@PopCultureCrisis"
        lane: owned
        notes: "ROS 62.6. Daily culture-war hot takes; lower brand risk than Fresh&Fit; open lane."
      - name: "Whatever"
        handle: "@whatever"
        lane: owned
        notes: "ROS 60.4. ⚠ MAIN HANDLE STALE (newest long-form 255d). ~27M/mo lives in the clips/shorts ecosystem — source from clip channels, not this handle."
      - name: "Whatever (clips)"
        handle: "@whatever2ND"
        lane: owned
        notes: "ROS 65.3 (Cycle 2). ✅ LIVE Whatever clip surface (fresh 0d) — use this instead of the stale main handle. Fresh dating/gender debate flashpoints."
      - name: "Modern Day Debate"
        handle: "@moderndaydebate"
        lane: owned
        notes: "ROS 56.8. Pure 1v1 debate format; small but clip-friendly; open lane."

  # ── Channel 2 · Money Fights — finance conflict (highest US RPM) ──
  - name: finance-money
    lane_default: owned
    creators:
      - name: "Ramit Sethi"
        handle: "@ramitsethi"
        lane: owned
        has_captions: true  # burns his own word captions (verified on a rendered frame 2026-06-25) — defer, don't stack ours (RULE #1)
        notes: "ROS 72.6 — #1 OPEN LANE. Money for Couples = real couples fighting over money. US top-RPM, dramatically under-clipped. Lead bet for Concept 2."
      - name: "Graham Stephan"
        handle: "@GrahamStephan"
        lane: owned
        notes: "ROS 65.2. Income/net-worth confessions; US top-RPM finance."
      - name: "Codie Sanchez"
        handle: "@codiesanchezCT"
        lane: owned
        notes: "ROS 65.2. 'Buy boring businesses' contrarian, quote-dense; open-moderate."
      - name: "My First Million"
        handle: "@MyFirstMillionPod"
        lane: owned
        notes: "ROS 61.7. 860+ eps of '$X/mo business' hooks; thin clipper field. ⚠ HubSpot-owned — test takedown posture early."
      - name: "Alex Hormozi"
        handle: "@AlexHormozi"
        lane: owned
        notes: "ROS 67.6 (Cycle 2). 9,713 views/hr — huge velocity; 258K median; business/MMO monologues; clip-tolerated. Saturated, so win on speed."
      - name: "Gary Vaynerchuk"
        handle: "@garyvee"
        lane: owned
        notes: "ROS 55.4 (Cycle 2). *Explicitly encourages clipping* = top compliance; business/keynote quote-bait; high RPM."

  # ── Channel 5 · Boardroom — business/mindset authority (#1 source: Diary of a CEO) ──
  - name: business-finance
    lane_default: owned
    creators:
      - name: "Diary of a CEO"
        handle: "@TheDiaryOfACEO"
        lane: owned
        notes: "ROS 86.5 — #1 OVERALL. 15M subs, 2.1M median views, contrarian-expert debate moments. High-RPM business authority."
      - name: "Iced Coffee Hour"
        handle: "@TheIcedCoffeeHour"
        lane: owned
        notes: "ROS 71.1. Net-worth reveals; US top-RPM finance. Strong clip points."
      - name: "Iman Gadzhi"
        handle: "@ImanGadzhi"
        lane: owned
        notes: "ROS 58.7. Talking-head MMO; saturated — win on speed."
      - name: "Jay Shetty"
        handle: "@jayshetty"
        lane: owned
        notes: "ROS 49.5. On Purpose — calm wisdom-drop monologues = Shorts-native. Saturated."
      # Mark Cuban / Trailblazers — low saturation, high-RPM business authority.
      # Add @handle once confirmed; agent-sourced, no live velocity pull yet.

  # ── Channel 3 · Crash Out — comedy/reaction (volume → YPP) ──
  - name: comedy-crashout
    lane_default: owned
    creators:
      - name: "Bad Friends"
        handle: "@BadFriends"
        lane: owned
        notes: "ROS 71.6 — OPEN LANE. 21,725 views/hr; high meme density; fan-clip swarm thinner than Theo/KillTony."
      - name: "Kill Tony"
        handle: "@killtony"
        lane: owned
        notes: "ROS 68.9. Self-contained 60s sets = most clippable format in podcasting. Saturated — clip the moments their editors skip."
      - name: "Flagrant"
        handle: "@OfficialFlagrant"
        lane: owned
        notes: "ROS 64.7. Schulz controversy-bait, big guests. ⚠ political eps = limited ads; cherry-pick."
      - name: "This Is Important"
        handle: "@thisisimportant"
        lane: owned
        notes: "ROS 45.2 but CLEAREST WHITE SPACE — Workaholics IP, no official clips channel. ⚠ iHeart-distributed — test Content ID before scaling."

  # ── Channel 4 · Phoenix Protocol — human optimization (evergreen, advertiser-safe) ──
  # LEAD VEIN (chosen 2026-06-25): protocols + myth-busting — save-bait AND share-bait, all
  # credentialed experts (monetization-safe). Discipline + longevity + breath/cold = expansion
  # veins, weighted up as the channel warms. ⚠ handles to confirm on first source run; verify
  # has_captions per creator on a rendered frame (caption-burners get cropped by reframe).
  - name: health-mythbusting
    lane_default: owned
    creators:
      # ── LEAD: protocols ──
      - name: "Andrew Huberman"
        handle: "@hubermanlab"
        lane: owned
        notes: "PROTOCOLS anchor — the #1 health-optimization clip engine. 'Do X for sleep/focus/dopamine.' Heavily clipped → win on framing. Verify has_captions (shorts burn captions; long-form usually clean)."
      - name: "Peter Attia"
        handle: "@PeterAttiaMD"
        lane: owned
        notes: "PROTOCOLS/longevity MD (The Drive). 'This adds/subtracts years' — save-bait, credentialed, ad-safe."
      - name: "Rhonda Patrick"
        handle: "@FoundMyFitness"
        lane: owned
        notes: "Protocol/supplement science (FoundMyFitness). Dense, save-bait; longevity audience."
      # ── LEAD: myth-busting ──
      - name: "Dr Mike Israetel"
        handle: "@RenaissancePeriodization"
        lane: owned
        notes: "ROS 62.9. MYTH-BUST core — #OutOfContextSeries actively encourages clips; meme-able."
      - name: "Jeff Nippard"
        handle: "@JeffNippard"
        lane: owned
        notes: "ROS 58.1. PROTOCOL+myth-bust — 'research actually says X'; advertiser-safe (pro-evidence)."
      - name: "Layne Norton"
        handle: "@biolayne1"
        lane: owned
        notes: "MYTH-BUST king — 'that supplement/diet is a scam', data-driven takedowns = #1 shareable per research."
      # ── Longevity support ──
      - name: "Bryan Johnson"
        handle: "@bryanjohnson"
        lane: owned
        notes: "ROS 61.1. '$2M/yr to not die' persona = viral; Netflix tailwind. Clip the persona, not prescriptions."
      - name: "Dr Gabrielle Lyon"
        handle: "@drgabriellelyon"
        lane: owned
        notes: "ROS 45.0 WHITESPACE — 'muscle = organ of longevity'; women's-health/longevity lane open."
      # ── Discipline spice + interview firehose (Eric's north-stars) ──
      # NOTE: David Goggins / Joe Rogan have NO clippable OWN channel (Goggins = IG + podcast-guest;
      # JRE = Spotify-audio + Content-ID heavy). The discipline/big-name vein surfaces via the
      # interview feeds below (Modern Wisdom interviews Goggins-types). Don't add a @davidgoggins
      # handle — it 404s; re-upload/motivation channels are someone else's clips (ineligible).
      - name: "Modern Wisdom"
        handle: "@ChrisWillx"
        lane: owned
        notes: "Chris Williamson INTERVIEWS all of the above (Huberman/Attia/Goggins-adjacent) — one feed, many experts = high clip yield. Verify has_captions (clips burn captions)."
      # ── EXPANSION veins — weight up as the channel warms ──
      - name: "Rich Roll"
        handle: "@richroll"
        lane: owned
        notes: "EXPANSION (transformation/endurance/midlife mindset). Long-form interviews; plant-based + discipline."
      - name: "Wim Hof"
        handle: "@wimhofmethod"
        lane: owned
        notes: "EXPANSION (breath/cold/recovery). 'Reset your nervous system' — strong hook, niche but loyal."
