        handle: "@PopCultureCrisis"
        lane: owned
        notes: "ROS 62.6. Daily culture-war hot takes; lower brand risk than Fresh&Fit; open lane."
      - name: "Whatever"
        handle: "@whatever"
        lane: owned
        notes: "ROS 60.4. ⚠ MAIN HANDLE STALE (newest long-form 255d). ~27M/mo lives in the clips/shorts ecosystem — source from clip channels, not this handle."
